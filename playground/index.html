<!DOCTYPE html>
<html>
<head>
    <title>Chat @ api.oops.wtf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .bot { align-self: flex-start; background: #333; }
        .input-box { display: flex; padding: 15px; background: #1e1e1e; border-top: 1px solid #333; }
        input { flex: 1; background: #2a2a2a; border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #007bff; border: none; color: white; padding: 0 20px; margin-left: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>

    <script>
        const WORKER_URL = "https://oops-proxy.deandre6156.workers.dev"; // e.g. https://groq-proxy.yourname.workers.dev
        let history = [];

async function send() {
            const el = document.getElementById('input');
            const chat = document.getElementById('chat');
            if(!el.value) return;

            const userMsg = el.value;
            el.value = '';
            
            chat.innerHTML += `<div class="msg user">${userMsg}</div>`;
            history.push({ role: "user", content: userMsg });
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST', // This MUST be uppercase
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ messages: history })
                });

                const data = await res.json();
                
                if (data.choices && data.choices[0]) {
                    const botMsg = data.choices[0].message.content;
                    chat.innerHTML += `<div class="msg bot">${botMsg}</div>`;
                    history.push({ role: "assistant", content: botMsg });
                } else {
                    // This will tell us if Groq is sending an error back
                    chat.innerHTML += `<div class="msg bot" style="color:red">Error: ${data.error?.message || JSON.stringify(data)}</div>`;
                }
            } catch (err) {
                chat.innerHTML += `<div class="msg bot" style="color:red">Fetch Error: ${err.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
