<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — BareAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <script>
    (function() {
      // Default to dark mode; respect explicit user preference if set
      var saved = localStorage.getItem('bareai-theme');
      if (saved !== 'light') document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    :root {
      --bg:        #ffffff;
      --surface:   #f8f8f9;
      --border:    #e4e4e9;
      --border2:   #d0d0d8;
      --text:      #0f0f14;
      --text2:     #3a3a46;
      --muted:     #7a7a8c;
      --muted2:    #9a9aac;
      --accent:    #5A0F85;
      --accent-lt: #7a1fb5;
      --accent-bg: #f5eefb;
      --nav-bg:    rgba(255,255,255,0.92);
      --sans: 'Figtree', sans-serif;
      --mono: 'DM Mono', monospace;
    }
    html.dark {
      --bg:        #0d0d10;
      --surface:   #141418;
      --border:    #26262e;
      --border2:   #32323c;
      --text:      #f0eff4;
      --text2:     #b8b6c4;
      --muted:     #6e6d7a;
      --muted2:    #55545f;
      --accent:    #9b4dca;
      --accent-lt: #b468e0;
      --accent-bg: #1e1028;
      --nav-bg:    rgba(13,13,16,0.92);
    }
    html { color-scheme: light; }
    html.dark { color-scheme: dark; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.25s, color 0.25s;
    }

    /* NAV */
    nav {
      padding: 0 48px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo-img {
      height: 28px;
      width: auto;
      display: block;
    }

    /* DARK MODE TOGGLE */
    .theme-toggle {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; color: var(--muted);
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border2); }
    .theme-toggle .icon-sun  { display: none; }
    .theme-toggle .icon-moon { display: block; }
    html.dark .theme-toggle .icon-sun  { display: block; }
    html.dark .theme-toggle .icon-moon { display: none; }

    /* CENTER CONTENT */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      gap: 0;
    }

    .error-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(80px, 14vw, 160px);
      font-weight: 600;
      color: var(--border2);
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.06em;
      user-select: none;
      font-family: var(--sans);
    }
    html.dark h1 { color: var(--border2); }

    p {
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
      letter-spacing: -0.01em;
    }
    .home-btn:hover { background: var(--accent-lt); transform: translateY(-1px); }

    @media (max-width: 480px) {
      nav { padding: 0 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <img src="/logo.png" alt="BareAI" class="logo-img" />
  </a>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</nav>

<div class="error-container">
  <div class="error-eyebrow">Page not found</div>
  <h1>404</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="home-btn">
    ← Back to Home
  </a>
</div>

<script>
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('bareai-theme', isDark ? 'dark' : 'light');
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('bareai-theme')) document.documentElement.classList.toggle('dark', e.matches);
  });
</script>
</body>
</html>
