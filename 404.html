<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — api.oops.wtf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0c0c0c;
      --surface:  #111111;
      --border:   #1f1f1f;
      --border2:  #2a2a2a;
      --text:     #e8e4dc;
      --muted:    #4a4a48;
      --muted2:   #666660;
      --green:    #3ddc84;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    * { position: relative; z-index: 1; }

    /* NAV */
    nav {
      padding: 0 40px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(12,12,12,0.9);
      backdrop-filter: blur(8px);
    }
    .logo {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .logo span { color: var(--muted2); }

    /* CENTER CONTENT */
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(60px, 10vw, 120px);
      font-weight: 300;
      color: var(--border2);
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.05em;
      user-select: none;
    }

    p {
      font-family: var(--sans);
      font-size: 16px;
      color: var(--muted2);
      margin-bottom: 40px;
    }

    .home-btn {
      padding: 12px 24px; 
      background: #3ddc84; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 500; 
      color: var(--bg); 
      font-family: var(--sans); 
      font-size: 14px; 
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .home-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">api<span>.oops.wtf</span></a>
</nav>

<div class="error-container">
  <h1>404</h1>
  <p>The page you are looking for does not exist.</p>
  <a href="/" class="home-btn">
    &larr; Back to Home
  </a>
</div>

</body>
</html>
