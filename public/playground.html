<!DOCTYPE html>
<html>
<head><title>Groq Playground</title></head>
<body style="font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px;">
    <h3>GROQ Chat</h3>
    <div id="box" style="height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px;"></div>
    <input id="msg" type="text" style="width: 70%;">
    <button onclick="send()">Send</button>

    <script>
        let history = [];
        async function send() {
            const input = document.getElementById('msg');
            const box = document.getElementById('box');
            const text = input.value;
            input.value = '';
            
            box.innerHTML += `<p><b>You:</b> ${text}</p>`;
            history.push({ role: "user", content: text });

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: history })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            box.innerHTML += `<p><b>Bot:</b> ${reply}</p>`;
            history.push({ role: "assistant", content: reply });
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
